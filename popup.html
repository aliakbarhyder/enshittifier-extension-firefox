<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Enshittifier</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="title">
        <span class="poop" aria-hidden="true">💩</span>
        <strong>Enshittifier</strong>
      </div>
      <label class="switch" title="Enable / disable">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </header>

    <p class="state" id="state"></p>

    <nav>
      <button type="button" id="settings">Settings</button>
      <a href="https://enshittifier.wells.ee" target="_blank" rel="noopener">Website</a>
    </nav>

    <script src="popup.js"></script>
  </body>
</html>
